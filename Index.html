      const guessExpression = (text) => {
        const t = String(text).toLowerCase();
        if (
          t.match(
            /\b(yay|awesome|great|thanks|thank you|celebrate|done|success)\b/,
          )
        )
          return "celebration";
        if (t.match(/\b(wow|whoa|really|omg)\b/)) return "surprised";
        if (t.match(/\b(sorry|apologize|issue|error|concerned|wrong)\b/))
          return "concerned";
        if (t.match(/\b(wait|hold on|moment|checking)\b/)) return "waiting";
        if (t.match(/\b(confused|not sure|don't know|what)\b|\?/))
          return "confused";
        if (t.match(/\b(inspired|idea|let's)\b/)) return "inspired";
        if (t.match(/\b(tired|exhausted)\b/)) return "tired";
        if (t.match(/\b(love|heart|perfect)\b/)) return "loving";
        if (t.match(/\b(wink|hint)\b/)) return "loving";
        if (t.match(/\b(stress|hard|difficult)\b/)) return "stressed";
        if (t.match(/\b(confirm|yes|sure|absolutely)\b/)) return "confirm";
        if (t.match(/\b(doubt|maybe|perhaps|unlikely)\b/)) return "doubtful";
        if (
          t.match(/\b(excited|can't wait|looking forward)\b/) ||
          t.includes("!")
        )
          return "excited";
        return "neutral";

      function RollingSubtitle() {
        const [showDivision, setShowDivision] = useState(false);
        const hasDivisionRoll = USER_ACCESS_ALLOWED && Boolean(USER_DIVISION);

        useEffect(() => {
          if (!hasDivisionRoll) {
            setShowDivision(false);
            return undefined;
          }

          const timer = setInterval(() => {
            setShowDivision((prev) => !prev);
          }, 5000);

          return () => clearInterval(timer);
        }, [hasDivisionRoll]);

        const subtitleText = !USER_ACCESS_ALLOWED
          ? HEADER_DENIED_TEXT
          : hasDivisionRoll && showDivision
            ? formatDivisionSubtitle(USER_DIVISION)
            : HEADER_BASE_TEXT;

        return (
          <div className="overflow-hidden h-[1.1rem] leading-none">
            <span
              key={subtitleText}
              className={`sia-roll-text text-[11px] font-medium uppercase tracking-wider mt-0.5 ${USER_ACCESS_ALLOWED ? "text-gray-400" : "text-amber-600"}`}
            >
              {subtitleText}
            </span>
          </div>
        );
      }

      function MessageContent({
        text,
        suggestions,
        download,
        onSelectSuggestion,
        hideSuggestionHeader = false,
      }) {
        const rawText = String(text || "");
        const showSuggestionHeader =
          !hideSuggestionHeader &&
          !rawText.toLowerCase().startsWith("did you mean");

        // Sanitize incoming HTML but allow a small whitelist of tags
        const sanitizeHtml = (dirty) => {
          try {
            if (!dirty) return "";
            const parser = new DOMParser();
            const doc = parser.parseFromString(String(dirty), "text/html");
            const allowed = ["B", "I", "STRONG", "EM", "BR", "P", "U", "SPAN"];

            const walk = (node) => {
              const children = Array.from(node.childNodes);
              children.forEach((child) => {
                if (child.nodeType === Node.ELEMENT_NODE) {
                  if (!allowed.includes(child.tagName)) {
                    // Replace disallowed elements with their text content (strip markup)
                    const textNode = doc.createTextNode(
                      child.textContent || "",
                    );
                    child.parentNode.replaceChild(textNode, child);
                  } else {
                    // Strip any attributes from allowed elements
                    Array.from(child.attributes).forEach((attr) =>
                      child.removeAttribute(attr.name),
                    );
                    walk(child);
                  }
                } else if (child.nodeType === Node.COMMENT_NODE) {
                  child.parentNode.removeChild(child);
                }
              });
            };

            walk(doc.body);
            return doc.body.innerHTML;
          } catch (e) {
            // Fallback: escape everything
            return String(dirty)
              .replace(/&/g, "&")
              .replace(/</g, "<")
              .replace(/>/g, ">");
          }
        };

        // Inline Suggestions Rendering logic
        const renderSuggestions = () => {
          if (!suggestions || suggestions.length === 0) return null;
          return (
            <div className="mt-5 pt-5 border-t border-slate-100 flex flex-col gap-4">
              {showSuggestionHeader && (
                <p className="text-[11px] font-bold text-slate-400 uppercase tracking-[0.15em] pl-1">
                  Did you mean...
                </p>
              )}
              <div className="flex flex-col gap-3">
                {suggestions.map((intent, i) => (
                  <button
                    key={intent.id}
                    onClick={() => onSelectSuggestion(intent)}
                    className="flex items-center justify-between w-full text-left p-4 rounded-lg border border-indigo-50 bg-indigo-50/20 hover:bg-indigo-50/50 hover:border-indigo-100 transition-all group active:scale-[0.99]"
                  >
                    <span className="text-[15px] font-semibold text-indigo-900 flex items-center gap-3">
                      <span className="text-indigo-300 font-bold min-w-[24px]">
                        {i + 1}.
                      </span>
                      <span
                        dangerouslySetInnerHTML={{
                          __html: sanitizeHtml(
                            intent.label || intent.displayText || "",
                          ),
                        }}
                      />
                    </span>
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                      strokeWidth={2.5}
                      stroke="currentColor"
                      className="w-4 h-4 text-indigo-300 group-hover:translate-x-1 transition-transform"
                    >
                      <path
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        d="M8.25 4.5l7.5 7.5-7.5 7.5"
                      />
                    </svg>
                  </button>
                ))}
              </div>
            </div>
          );
        };

        const renderDownload = () => {
          if (!download || !download.content) return null;
          const filename = download.filename || "commsched-export.csv";
          const mimeType = download.mimeType || "text/csv";

          const handleDownload = () => {
            try {
              const blob = new Blob([download.content], {
                type: `${mimeType};charset=utf-8`,
              });
              const url = URL.createObjectURL(blob);
              const link = document.createElement("a");
              link.href = url;
              link.download = filename;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              URL.revokeObjectURL(url);
            } catch (e) {
              // Fallback: no-op
            }
          };

          return (
            <div className="mt-4">
              <button
                onClick={handleDownload}
                className="inline-flex items-center gap-2 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 transition-colors"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  className="w-4 h-4"
                >
                  <path d="M12 3a.75.75 0 0 1 .75.75v8.19l2.22-2.22a.75.75 0 1 1 1.06 1.06l-3.5 3.5a.75.75 0 0 1-1.06 0l-3.5-3.5a.75.75 0 1 1 1.06-1.06l2.22 2.22V3.75A.75.75 0 0 1 12 3Z" />
                  <path d="M4.5 14.25a.75.75 0 0 1 .75.75v2.25c0 .414.336.75.75.75h12a.75.75 0 0 0 .75-.75V15a.75.75 0 0 1 1.5 0v2.25A2.25 2.25 0 0 1 18 19.5H6A2.25 2.25 0 0 1 3.75 17.25V15a.75.75 0 0 1 .75-.75Z" />
                </svg>
                Download CSV
              </button>
            </div>
          );
        };

        if (
          rawText.includes("[TABLE]") ||
          (rawText.includes("|") && rawText.includes("---"))
        ) {
          const cleanText = rawText.replace(/\[\/?TABLE\]/g, "");
          const lines = cleanText.split("\n");
          const tableLines = lines.filter((l) => l.trim().startsWith("|"));
          const nonTableLines = lines.filter((l) => !l.trim().startsWith("|"));

          if (tableLines.length > 2) {
            const parseRow = (row) =>
              row
                .split("|")
                .map((c) => c.trim())
                .filter((_, i, arr) => i > 0 && i < arr.length - 1);
            const headers = parseRow(tableLines[0]);
            const rows = tableLines.slice(2).map(parseRow);

            return (
              <div className="flex flex-col gap-2 w-full">
                {nonTableLines.map((ln, i) =>
                  ln.trim() ? (
                    <div
                      key={`txt-${i}`}
                      className="whitespace-pre-wrap"
                      dangerouslySetInnerHTML={{ __html: sanitizeHtml(ln) }}
                    />
                  ) : null,
                )}
                <div className="overflow-x-auto w-full mt-1 mb-1 rounded-lg border border-gray-200 shadow-sm">
                  <table className="min-w-full text-sm text-left">
                    <thead className="bg-[#eef0fb] text-[#2d2f8e] border-b border-indigo-100">
                      <tr>
                        {headers.map((h, i) => (
                          <th
                            key={`h-${i}`}
                            className="px-3 py-2.5 font-semibold whitespace-nowrap"
                          >
                            {h}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {rows.map((row, i) => (
                        <tr
                          key={`r-${i}`}
                          className={
                            i % 2 === 0
                              ? "bg-white"
                              : "bg-gray-50 hover:bg-gray-100"
                          }
                        >
                          {row.map((cell, j) => (
                            <td
                              key={`c-${i}-${j}`}
                              className="px-3 py-2 border-b border-gray-100 whitespace-nowrap text-gray-700"
                              dangerouslySetInnerHTML={{
                                __html: sanitizeHtml(cell),
                              }}
                            />
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                {renderDownload()}
                {renderSuggestions()}
              </div>
            );
          }
        }

        return (
          <React.Fragment>
            {rawText.split("\n").map((ln, i) => (
              <div
                key={i}
                className="min-h-[1.25em] whitespace-pre-wrap"
                dangerouslySetInnerHTML={{ __html: sanitizeHtml(ln) }}
              />
            ))}
            {renderDownload()}
            {renderSuggestions()}
          </React.Fragment>
        );
      }

      function ChatApp() {
        const [showSplash, setShowSplash] = useState(true);
        const [hasStarted, setHasStarted] = useState(false);
        const [showResetConfirm, setShowResetConfirm] = useState(false);
        const [intentSuggestions, setIntentSuggestions] = useState(null);
        const [pendingIntent, setPendingIntent] = useState(null); // short-lived pending intent for slot-filling
        const [pendingUnGrdEntityType, setPendingUnGrdEntityType] =
          useState("");
        const [messages, setMessages] = useState([]);
        const [inputValue, setInputValue] = useState("");
        const [isTyping, setIsTyping] = useState(false);
        const [reauthMessage, setReauthMessage] = useState("");
        const [reauthInProgress, setReauthInProgress] = useState(false);
        const messagesEndRef = useRef(null);
        const inputRef = useRef(null);

        // --- Local Small Talk Handling ---
        const detectSmallTalk = (text) => {
          const t = String(text || "")
            .toLowerCase()
            .trim();
          // Blacklist query-like keywords
          if (
            t.match(
              /\b(po|gr|status|list|show|check|aging|risk|billing|inventory)\b/,
            )
          )
            return false;

          // Whitelists
          if (
            t.match(
              /\b(hi|hello|hey|yo|howdy|good morning|good afternoon|good evening)\b/,
            )
          )
            return true;
          if (t.match(/\b(thank(s|u)?|thx|appreciate|grateful)\b/)) return true;
          if (t.match(/\b(bye|goodbye|see you|later|cya|talk soon)\b/))
            return true;
          if (
            t.match(
              /^(yes|yep|yup|sure|ok|okay|cool|awesome|perfect|absolutely)$/,
            )
          )
            return true;
          if (t.match(/^(no|nope|nah|not really)$/)) return true;
          if (t.match(/\b(how are (you|things)|how'?s it going|what'?s up)\b/))
            return true;

          return false;
        };

        const generateSmallTalkReply = (text) => {
          const t = String(text || "").toLowerCase();
          let response = "Got it!";
          let exp = "loving";

          if (t.match(/\b(hi|hello|hey|yo|howdy|good)\b/)) {
            response = `Hi there! 👋🏻 I'm SIA. What can I help you with today?`;
            exp = "excited";
          } else if (t.match(/\b(thank(s|u)?|thx|appreciate|grateful)\b/)) {
            response = "You're very welcome! I'm happy to help. 😊";
            exp = "loving";
          } else if (
            t.match(/\b(how are (you|things)|how'?s it going|what'?s up)\b/)
          ) {
            response =
              "I'm doing well, thanks for asking! Ready to assist you.";
            exp = "neutral";
          } else if (t.match(/\b(bye|goodbye|see you|later|cya)\b/)) {
            response =
              "Goodbye! Feel free to come back anytime you need help. 👋🏻";
            exp = "neutral";
          } else if (
            t.match(
              /^(yes|yep|yup|sure|ok|okay|cool|awesome|perfect|absolutely)$/,
            )
          ) {
            response = "Great!";
            exp = "confirm";
          } else if (t.match(/^(no|nope|nah|not really)$/)) {
            response = "No problem! Let me know if you need anything else.";
            exp = "neutral";
          }

          return {
            id: "bot-" + Date.now(),
            who: "bot",
            text: response,
            expression: exp,
            ts: new Date().toISOString(),
          };
        };
        // ---------------------------------

        useEffect(() => {
          const splashShown = sessionStorage.getItem("sia_splash_shown");
          if (splashShown) {
            setShowSplash(false);
          } else {
            const timer = setTimeout(() => {
              setShowSplash(false);
              sessionStorage.setItem("sia_splash_shown", "true");
            }, 2500);
            return () => clearTimeout(timer);
          }
        }, []);

        // Preload common expression images
        useEffect(() => {
          ["neutral", "thinking", "excited"].forEach((ext) => {
            if (EXPRESSIONS[ext]) {
              const img = new Image();
              img.src = EXPRESSIONS[ext];
            }
          });
        }, []);

        // Load saved chat from local storage
        useEffect(() => {
          if (localStorage.getItem(STARTED_STORAGE_KEY)) {
            setHasStarted(true);
          }
          try {
            const s = localStorage.getItem(CHAT_STORAGE_KEY);
            if (s) {
              const parsed = JSON.parse(s);
              // Handle legacy { messages: [] } object from previous version
              const restoredMessages = Array.isArray(parsed)
                ? parsed
                : parsed.messages || [];
              if (!USER_ACCESS_ALLOWED) {
                setMessages([
                  {
                    id: "bot-" + Date.now(),
                    who: "bot",
                    text: ACCESS_DENIED_REPLY,
                    expression: "concerned",
                    ts: new Date().toISOString(),
                  },
                ]);
              } else {
                setMessages(restoredMessages);
              }
            }
          } catch (e) {}
        }, []);

        // Save chat back to storage on updates
        useEffect(() => {
          if (messages.length > 0) {
            try {
              const compactMessages = messages.map((message) => {
                if (!message || !message.download || !message.download.content) {
                  return message;
                }

                const { content, ...downloadMeta } = message.download;
                return {
                  ...message,
                  download: downloadMeta,
                };
              });

              localStorage.setItem(
                CHAT_STORAGE_KEY,
                JSON.stringify(compactMessages),
              );
            } catch (e) {
              // Ignore storage quota / serialization issues for large table exports.
            }
          }
        }, [messages]);

        // Welcome message trigger
        useEffect(() => {
          if (!hasStarted) return;
          if (
            messages.length === 0 &&
            !localStorage.getItem(CHAT_STORAGE_KEY)
          ) {
            if (!USER_ACCESS_ALLOWED) {
              setMessages([
                {
                  id: "bot-" + Date.now(),
                  who: "bot",
                  text: ACCESS_DENIED_REPLY,
                  expression: "concerned",
                  ts: new Date().toISOString(),
                },
              ]);
              return;
            }

            setMessages([
              {
                id: "bot-" + Date.now(),
                who: "bot",
                text: `${formatSiaGreeting(USER_FIRST_NAME)}, your Status & Insights Assistant. How can I help today?`,
                expression: "excited",
                ts: new Date().toISOString(),
              },
              {
                id: "bot-" + (Date.now() + 1),
                who: "bot",
                text: "Try quick replies below to explore common tasks.",
                expression: "loving",
                ts: new Date().toISOString(),
              },
            ]);
          }
        }, [hasStarted, messages.length]);

        // Auto-scroll inside chat
        const scrollToBottom = () => {
          messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
        };

        useEffect(() => {
          scrollToBottom();
        }, [messages, isTyping]);

        // Built-in placeholder responder removed.
        // We intentionally do not return canned fallback messages here.
        // When no server is available, sendToServer will resolve to null
        // and the UI will not insert placeholder bot replies.
        const botRespondFor = (text) => null;

        // Hook for Apps Script if deployed there
        // Do not fall back to canned placeholder replies when offline.
        const sendToServer = (
          text,
          triggerSource = "query",
          confirmedUnGrdEntityType = "",
          extraOptions = {},
        ) => {
          return new Promise((resolve) => {
            // Local small talk interceptor
            if (triggerSource === "query" && detectSmallTalk(text)) {
              resolve(generateSmallTalkReply(text));
              return;
            }

            if (window.google && google.script && google.script.run) {
              try {
                google.script.run
                  .withSuccessHandler(resolve)
                  .withFailureHandler(() => resolve(null))
                  .getGeminiResponse(text, Object.assign({
                    triggerSource,
                    confirmedUnGrdEntityType,
                    // Also pass the generic confirmedEntityType so new disambiguation flows
                    // (e.g. vendor vs division for PO totals) can use it without changing client
                    // behavior. We mirror the unGR entity type into the generic slot.
                    confirmedEntityType: confirmedUnGrdEntityType,
                  }, extraOptions));
                return;
              } catch (e) {
                resolve(null);
                return;
              }
            }
            // No server available — do not return placeholder responses.
            resolve(null);
          });
        };

        const getIntentInfo = (text) => {
          return new Promise((resolve) => {
            if (window.google && google.script && google.script.run) {
              try {
                google.script.run
                  .withSuccessHandler(resolve)
                  .withFailureHandler(() => resolve(null))
                  .getIntentInfo(text);
                return;
              } catch (e) {
                resolve(null);
                return;
              }
            }
            resolve(null);
          });
        };

        const isLikelyListQuery = (text) => {
          const t = String(text || "").toLowerCase();
          return (
            t.includes("list") ||
            t.includes("which pos") ||
            t.includes("which po") ||
            t.includes("show me all") ||
            t.includes("older than") ||
            t.includes("beyond") ||
            t.includes("high risk") ||
            t.includes("legacy")
          );
        };

        const handleSend = async (text, triggerSource = "query") => {
          const isSuggestionPayload = text && typeof text === "object" && !Array.isArray(text);
          const raw = isSuggestionPayload ? String(text.label || text.displayText || text.query || "").trim() : String(text || "").trim();
          if (!raw) return;
          const startedAt = Date.now();

          // Set User Message (display the user's raw text)
          setMessages((prev) => [
            ...prev,
            {
              id: "user-" + Date.now(),
              who: "user",
              text: raw,
              ts: new Date().toISOString(),
            },
          ]);
          setInputValue("");
          try { if (inputRef.current) inputRef.current.style.height = 'auto'; } catch (e) {}
          inputRef.current && inputRef.current.focus();

          setIsTyping(true);

          // Combine pending intent answers into original phrase when applicable
          let sendText = isSuggestionPayload && text.query ? String(text.query || "").trim() : raw;
          const clickedUnGrdEntityType = isSuggestionPayload && text.entityType ? String(text.entityType || "").trim().toLowerCase() : "";
          const effectiveUnGrdEntityType = clickedUnGrdEntityType || pendingUnGrdEntityType;
          try {
            if (pendingIntent) {
              if (pendingIntent.missingEntity === "PO_NUMBER" && /^\d{10}$/.test(raw)) {
                sendText = pendingIntent.phrase ? String(pendingIntent.phrase).replace(/\bPO X\b/gi, "PO " + raw).replace(/\bX\b/gi, raw) : raw;
                setPendingIntent(null);
              } else if (pendingIntent.missingEntity === "GR_NUMBER" && /^\d{1,9}$/.test(raw)) {
                sendText = pendingIntent.phrase ? String(pendingIntent.phrase).replace(/\bGR X\b/gi, "GR " + raw).replace(/\bX\b/gi, raw).replace(/\s+/g, " ").trim() : "GR ticket status for GR " + raw;
                setPendingIntent(null);
              } else if (pendingIntent.missingEntity === "AGE_FILTER" && raw) {
                sendText = pendingIntent.phrase ? String(pendingIntent.phrase).replace(/\bX\b/gi, raw).replace(/\s+/g, " ").trim() : "List all POs " + raw + " old";
                setPendingIntent(null);
              } else if (pendingIntent.missingEntity === "VENDOR" && raw) {
                sendText = pendingIntent.phrase ? String(pendingIntent.phrase).replace(/\bX\b/gi, raw).replace(/\s+/g, " ").trim() : "List all POs from " + raw;
                setPendingIntent(null);
              }
            }
            if (clickedUnGrdEntityType === "vendor" || clickedUnGrdEntityType === "division") {
              setPendingUnGrdEntityType(clickedUnGrdEntityType);
            }
          } catch (e) {
            sendText = raw;
          }

          // Sentence splitter utility
          const splitIntoSentences = (t) => {
            if (!t) return [];
            const matches = String(t || "").match(/[^.!?]+[.!?]?/g);
            return matches ? matches.map((s) => s.trim()).filter(Boolean) : [];
          };

          let shouldShowWait = false;
          if (USER_ACCESS_ALLOWED) {
            try {
              const intentInfo = await getIntentInfo(raw);
              if (intentInfo && intentInfo.isList && intentInfo.hasRequiredEntities) {
                shouldShowWait = true;
              } else if (!intentInfo) {
                shouldShowWait = isLikelyListQuery(raw);
              }
            } catch (e) {
              shouldShowWait = isLikelyListQuery(raw);
            }
          }

          if (shouldShowWait) {
            setMessages((prev) => [
              ...prev,
              {
                id: "bot-wait-" + Date.now(),
                who: "bot",
                text: "Please wait while we process your query. This may take a few minutes.",
                ts: new Date().toISOString(),
              },
            ]);
          }

          const delay = USER_ACCESS_ALLOWED ? 400 + Math.random() * 900 : 0;
          await new Promise((r) => setTimeout(r, delay));

          try {
            const extraOptions = isSuggestionPayload && text && text.forceBulk ? { forceBulk: true } : {};

            // Prepare sentences or single entry to process
            const sentences = splitIntoSentences(sendText || raw);
            const MAX_SENTENCES = 5;
            let toProcess = sentences.length > 1 ? sentences : [sendText];
            if (sentences.length > MAX_SENTENCES) {
              toProcess = sentences.slice(0, MAX_SENTENCES);
              setMessages((prev) => [
                ...prev,
                {
                  id: "bot-caveat-" + Date.now(),
                  who: "bot",
                  text: `I detected ${sentences.length} questions — processing the first ${MAX_SENTENCES} now.`,
                  expression: "waiting",
                  ts: new Date().toISOString(),
                },
              ]);
            }

            // Send requests in parallel and preserve order
            const respPromises = toProcess.map((s) => sendToServer(s, triggerSource, effectiveUnGrdEntityType, extraOptions));
            const responses = await Promise.all(respPromises);

            // Remove any interim 'Please wait' bot-wait messages we may have added
            setMessages((prev) => prev.filter((m) => !(m.id && String(m.id).startsWith("bot-wait-"))));

            // If no responses at all, bail
            const anyValid = responses.some((r) => r !== null && r !== undefined && String(r).trim() !== "");
            if (!anyValid) { setIsTyping(false); return; }

            // Append each response as its own bot message (keeps order)
            responses.forEach((resp) => {
              if (resp === null || resp === undefined || String(resp).trim() === "") return;
              const isStructuredResponse = resp && typeof resp === "object" && !Array.isArray(resp);
              const textVal = isStructuredResponse ? String(resp.text || "") : String(resp || "");
              const elapsedSeconds = Math.max(1, Math.round((Date.now() - startedAt) / 1000));
              const responseText = isStructuredResponse && resp.download ? `${textVal.trim()} (Generated in ${elapsedSeconds}s)` : textVal;

              if (resp && resp.pendingIntent) setPendingIntent(resp.pendingIntent);

              if (isStructuredResponse && Array.isArray(resp.suggestions) && resp.suggestions.length > 0) {
                const suggestionType = String(resp.suggestions[0] && resp.suggestions[0].entityType ? resp.suggestions[0].entityType : "").trim().toLowerCase();
                if (suggestionType === "vendor" || suggestionType === "division") setPendingUnGrdEntityType(suggestionType);
              } else if (!resp.pendingIntent) {
                setPendingUnGrdEntityType("");
              }

              setMessages((prev) => [
                ...prev,
                {
                  id: "bot-" + Date.now() + Math.floor(Math.random() * 1000),
                  who: "bot",
                  text: responseText,
                  expression: isStructuredResponse && resp.expression ? resp.expression : guessExpression(textVal),
                  suggestions: isStructuredResponse && Array.isArray(resp.suggestions) ? resp.suggestions : undefined,
                  hideSuggestionHeader: isStructuredResponse && Boolean(resp.hideSuggestionHeader),
                  download: isStructuredResponse && resp.download ? resp.download : undefined,
                  ts: new Date().toISOString(),
                },
              ]);
            });
          } catch (e) {
            setMessages((prev) => [
              ...prev,
              {
                id: "bot-" + Date.now(),
                who: "bot",
                text: "Sorry, something went wrong.",
                expression: "stressed",
                ts: new Date().toISOString(),
              },
            ]);
          }
          setIsTyping(false);
        };

        const onKeyDown = (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            handleSend(inputValue, "query");
          }
        };

        const handleGetStarted = () => {
          finishTutorial();
        };

        const finishTutorial = () => {
          setHasStarted(true);
          localStorage.setItem(STARTED_STORAGE_KEY, "true");
        };

        const handleTroubleAccess = () => {
          if (reauthInProgress) return;

          setReauthInProgress(true);
          setReauthMessage("");

          const finish = (message) => {
            setReauthInProgress(false);
            setReauthMessage(String(message || ""));
          };

          const openAuthUrl = (info) => {
            const authUrl = String(
              (info && (info.authorizationUrl || info.authUrl)) || "",
            ).trim();
            if (authUrl) {
              try {
                window.open(authUrl, "_blank", "noopener,noreferrer");
                finish("");
                return;
              } catch (e) {
                // Fall through to a friendly message below.
              }
            }

            finish(
              (info && info.message) ||
                "No authorization link was returned. Please try again or open the Apps Script editor once.",
            );
          };

          if (window.google && google.script && google.script.run) {
            try {
              google.script.run
                .withSuccessHandler(openAuthUrl)
                .withFailureHandler(() => {
                  finish(
                    "I couldn't open the authorization flow from here. Please use the Apps Script editor once, then come back and refresh the web app.",
                  );
                })
                .getReauthorizationInfo();
              return;
            } catch (e) {
              finish(
                "I couldn't open the authorization flow from here. Please use the Apps Script editor once, then come back and refresh the web app.",
              );
              return;
            }
          }

          finish(
            "Open this app from the deployed Apps Script web app to access the authorization link.",
          );
        };

        const handleResetChat = () => {
          setShowResetConfirm(true);
        };

        const confirmReset = () => {
          localStorage.removeItem(CHAT_STORAGE_KEY);
          localStorage.removeItem(STARTED_STORAGE_KEY);
          setMessages([]);
          setHasStarted(false);
          setShowResetConfirm(false);
          setInputValue("");
        };

        if (showSplash) {
          return (
            <div className="h-full w-full flex flex-col items-center justify-center bg-[#c6d3f8] min-h-screen transition-opacity duration-500">
              <div className="flex flex-col items-center animate-in fade-in duration-700">
                <LogoMark className="w-24 h-24 rounded-md sia-intro" />
                <h1 className="mt-6 text-3xl font-bold text-[#4784d7] tracking-tight sia-intro">
                  SIA
                </h1>
              </div>
            </div>
          );
        }

        return (
          <div className="flex flex-col h-full w-full">
            {/* Modals & Dialogs */}
            {showResetConfirm && (
              <Modal
                title="Clear History?"
                onClose={() => setShowResetConfirm(false)}
              >
                <div className="flex flex-col gap-6 py-2">
                  <p className="text-gray-500 text-sm leading-relaxed">
                    Are you sure you want to delete all messages? This action
                    cannot be undone.
                  </p>
                  <div className="flex gap-3">
                    <button
                      onClick={() => setShowResetConfirm(false)}
                      className="flex-1 py-3 px-4 rounded-lg border border-gray-200 font-semibold text-gray-600 hover:bg-gray-50 transition-colors"
                    >
                      Cancel
                    </button>
                    <button
                      onClick={confirmReset}
                      className="flex-1 py-3 px-4 rounded-lg bg-red-600 text-white font-semibold hover:bg-red-700 transition-colors shadow-lg shadow-red-100"
                    >
                      Clear All
                    </button>
                  </div>
                </div>
              </Modal>
            )}

            {/* Header */}
            <header className="flex items-center justify-between p-4 md:border-b bg-white shrink-0 md:shadow-sm z-10 w-full">
              <div className="flex items-center gap-3">
                <LogoMark />
                <div>
                  <div className="font-bold text-[#2d2f8e] text-lg leading-tight tracking-wide">
                    SIA
                  </div>
                  <RollingSubtitle />
                </div>
              </div>
              {hasStarted && (
                <div className="flex items-center gap-2">
                  {USER_CONTEXT.isAdmin && (
                    <a
                      href="https://datastudio.google.com/u/0/reporting/08c4ccc4-243a-47bf-a073-e6e6a0d71b1e/page/p_q5ejjxky3d"
                      target="_blank"
                      rel="noopener noreferrer"
                      className="flex items-center gap-2 px-4 py-2 rounded-lg text-[#2d2f8e] hover:text-[#23257a] hover:bg-indigo-50 transition-all font-semibold text-xs border border-indigo-100"
                      title="Open Admin Dashboard"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        strokeWidth={2.5}
                        stroke="currentColor"
                        className="w-4 h-4"
                      >
                        <path
                          strokeLinecap="round"
                          strokeLinejoin="round"
                          d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"
                        />
                      </svg>
                      <span>Dashboard</span>
                    </a>
                  )}
                  <button
                    onClick={handleResetChat}
                    className="flex items-center gap-2 px-4 py-2 rounded-lg text-gray-500 hover:text-red-600 hover:bg-red-50 transition-all font-semibold text-xs border border-gray-100 hover:border-red-100"
                    title="Clear all messages and start a new conversation"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      strokeWidth="2.5"
                      className="w-4 h-4"
                    >
                      <path
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        d="M21 2v6h-6M21 8.2A9 9 0 1112 3a9 9 0 019 5.2z"
                      />
                    </svg>
                    <span>Restart Chat</span>
                  </button>
                </div>
              )}
            </header>

            {!hasStarted ? (
              <div className="p-6 md:p-10 bg-white border-t shrink-0 flex flex-col items-center justify-center gap-6 min-h-[400px]">
                <div className="w-full max-w-sm flex flex-col bg-[#f0f2f9] rounded-2xl overflow-hidden border border-gray-100 shadow-sm">
                  <TutorialView onFinish={finishTutorial} isEmbedded={true} />
                </div>
                <div className="flex flex-col items-center gap-4 w-full max-w-sm">
                  <button
                    onClick={finishTutorial}
                    className="w-full bg-[#2d2f8e] hover:bg-[#23257a] text-white font-bold py-5 rounded-2xl shadow-[0_18px_32px_rgba(20,29,56,0.36)] transition-all active:scale-[0.98] focus:ring-4 focus:ring-indigo-300"
                  >
                    Get Started
                  </button>
                  {!USER_ACCESS_ALLOWED ? (
                    <button
                      onClick={handleTroubleAccess}
                      disabled={reauthInProgress}
                      className="text-[13px] font-medium text-white underline underline-offset-4 hover:text-gray-200 disabled:cursor-not-allowed disabled:opacity-60 mt-2"
                    >
                      Trouble having access? Click here.
                    </button>
                  ) : null}
                  {reauthMessage ? (
                    <p className="text-[12px] text-center text-gray-200 leading-relaxed max-w-[18rem]">
                      {reauthMessage}
                    </p>
                  ) : null}
                </div>
              </div>
            ) : (
              <React.Fragment>
                {/* Messages Body */}
                <main
                  className="flex-1 overflow-y-auto p-4 md:p-6 bg-[#c6d3f8] flex flex-col gap-5"
                  aria-live="polite"
                >
                  {messages.map((m) => (
                    <div
                      key={m.id}
                      className={`flex w-full items-end ${m.who === "user" ? "justify-end" : "justify-start"}`}
                    >
                      {m.who !== "user" && (
                        <img
                          src={EXPRESSIONS[m.expression] || EXPRESSIONS.neutral}
                          alt="SIA"
                          className="w-10 h-10 rounded-lg mr-2 object-cover shrink-0"
                          onError={(e) => {
                            e.target.src = LOGO_IMAGE_URL;
                          }}
                        />
                      )}
                      <div
                        className={`max-w-[85%] md:max-w-[75%] text-[15px] shadow-sm flex flex-col ${m.who === "user" ? "bg-[#3d8bec] text-white rounded-md rounded-br-sm px-4 py-3" : m.suggestions ? "bg-white border border-gray-100 text-gray-800 rounded-md rounded-bl-sm overflow-hidden p-6 shadow-md" : "bg-white border border-gray-100 text-gray-800 rounded-md rounded-bl-sm overflow-hidden px-4 py-3"}`}
                      >
                        <MessageContent
                          text={m.text}
                          suggestions={m.suggestions}
                          download={m.download}
                          hideSuggestionHeader={m.hideSuggestionHeader}
                          onSelectSuggestion={(item) =>
                            handleSend(item, "menu")
                          }
                        />
                      </div>
                    </div>
                  ))}

                  {isTyping && (
                    <div className="flex justify-start items-end">
                      <img
                        src={EXPRESSIONS.thinking}
                        alt="SIA thinking"
                        className="w-10 h-10 rounded-lg mr-2 object-cover shrink-0"
                        onError={(e) => {
                          e.target.src = LOGO_IMAGE_URL;
                        }}
                      />
                      <div className="flex items-center gap-1.5 bg-white border border-gray-100 px-5 py-4 rounded-xl rounded-bl-sm text-sm shadow-sm">
                        <span
                          className="w-2 h-2 bg-[#4784d7] rounded-full animate-bounce"
                          style={{ animationDelay: "0s" }}
                        ></span>
                        <span
                          className="w-2 h-2 bg-[#4784d7] rounded-full animate-bounce"
                          style={{ animationDelay: "0.15s" }}
                        ></span>
                        <span
                          className="w-2 h-2 bg-[#4784d7] rounded-full animate-bounce"
                          style={{ animationDelay: "0.3s" }}
                        ></span>
                      </div>
                    </div>
                  )}
                  <div ref={messagesEndRef} />
                </main>

                {/* Quick Replies */}
                <div className="pt-3 pb-2 px-3 md:px-6 border-t bg-slate-50 flex gap-2 flex-nowrap overflow-x-auto whitespace-nowrap shrink-0 snap-x">
                  <div className="text-[11px] font-bold text-gray-400 flex items-center px-1 uppercase tracking-widest shrink-0 select-none">
                    Quick Replies
                  </div>
                  {QUICK.map((label) => (
                    <button
                      key={label}
                      type="button"
                      onClick={() => handleSend(label, "menu")}
                      className="snap-start text-[13px] px-3.5 py-1.5 rounded-md border border-gray-200 text-gray-700 bg-white hover:bg-gray-100 transition-all font-medium whitespace-nowrap shrink-0 shadow-sm"
                    >
                      {label}
                    </button>
                  ))}
                </div>

                {/* Persistent Menu */}
                <div className="pt-3 pb-2 px-3 md:px-6 border-t bg-slate-50 flex gap-2 flex-nowrap overflow-x-auto whitespace-nowrap shrink-0 snap-x">
                  <div className="text-[11px] font-bold text-gray-400 flex items-center px-1 uppercase tracking-widest shrink-0 select-none">
                    Menu
                  </div>
                  {PERSISTENT_MENU.map((label) => (
                    <button
                      key={label}
                      type="button"
                      onClick={() => handleSend(label, "menu")}
                      className="snap-start text-[13px] px-3.5 py-1.5 rounded-md border border-gray-200 text-gray-700 bg-white hover:bg-gray-100 transition-all font-medium whitespace-nowrap shrink-0 shadow-sm"
                    >
                      {label}
                    </button>
                  ))}
                </div>

                {/* Composer Output row */}
                <form
                  className="p-4 md:px-6 md:pb-5 border-t bg-white flex gap-3 items-end shrink-0"
                  onSubmit={(e) => {
                    e.preventDefault();
                    handleSend(inputValue, "query");
                  }}
                >
                  <textarea
                    ref={inputRef}
                    rows="1"
                    value={inputValue}
                    onChange={(e) => setInputValue(e.target.value)}
                    onInput={(e) => {
                      try {
                        e.target.style.height = 'auto';
                        const max = Math.floor(window.innerHeight * 0.4);
                        e.target.style.height = Math.min(e.target.scrollHeight, max) + 'px';
                      } catch (err) {}
                      setInputValue(e.target.value);
                    }}
                    onKeyDown={onKeyDown}
                    placeholder={
                      USER_ACCESS_ALLOWED
                        ? "Type a message..."
                        : "Please contact an admin to use the chatbot."
                    }
                    className="flex-1 resize-none border border-gray-300 rounded-lg px-4 py-3.5 text-[15px] focus:outline-none focus:border-[#2d2f8e] focus:ring-2 focus:ring-indigo-100 shadow-sm transition-all max-h-[40vh] overflow-y-auto w-full"
                    aria-label="Message input"
                  ></textarea>
                  <button
                    type="submit"
                    disabled={!inputValue.trim()}
                    className="bg-[#2d2f8e] disabled:bg-[#8082c0] hover:bg-[#23257a] text-white px-5 py-3.5 rounded-lg font-semibold shadow-sm transition-all flex items-center justify-center shrink-0"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      fill="currentColor"
                      className="w-6 h-6"
                    >
                      <path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" />
                    </svg>
                  </button>
                </form>
              </React.Fragment>
            )}
          </div>
        );
      }

      const rootElement = document.getElementById("root");
      const root = ReactDOM.createRoot(rootElement);
      root.render(<ChatApp />);
    </script>
  </body>
</html>
